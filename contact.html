  <section class="page-hero">
    <div class="container">
      <p class="eyebrow">Contact</p>
      <h1>Some conversations change the direction of a business.</h1>
      <p>If my thinking resonates with the situation you are facing, you can reach me through the form below.</p>
    </div>
  </section>
  <section class="page-section">
    <div class="container contact-layout no-photo">
      <form action="https://formsubmit.co/firas.baklouti@gmail.com" method="POST" class="contact-form">
        <input type="hidden" name="_subject" value="Inquiry from firasbaklouti.com">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" value="https://firasbaklouti.com">
        <input type="text" name="Name" placeholder="Your name" required>
        <input type="text" name="Company" placeholder="Company / organization">
        <input type="email" name="Email" placeholder="Work email" required>
        <input type="text" name="Role" placeholder="Your role">
        <select name="Conversation Type" required>
          <option selected disabled>Conversation type</option>
          <option>Leadership conversation</option>
          <option>Founder / business build</option>
          <option>Board / strategic discussion</option>
          <option>Investor / portfolio company</option>
          <option>Executive search</option>
          <option>Other</option>
        </select>
        <textarea name="Message" rows="7" placeholder="Briefly describe the context." required></textarea>
        <button class="button primary" type="submit">Send</button>
      </form>
    </div>
  </section>
